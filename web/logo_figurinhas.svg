<svg xmlns="http://www.w3.org/2000/svg" width="680" height="680" viewBox="0 0 680 680" role="img" aria-label="Calculadora de Figurinhas">
  <title>Calculadora de Figurinhas</title>
  <desc>Logo flat com álbum aberto em contorno, figurinhas empilhadas e lupa com cifrão</desc>

  <rect width="680" height="680" rx="140" fill="white"/>

  <!-- ÁLBUM — depth atrás -->
  <path d="M108,148 L108,548 L118,558 L118,158 Z" fill="#1a3a6b"/>
  <path d="M122,142 L122,542 L132,552 L132,152 Z" fill="#1a3a6b"/>

  <!-- Capa esquerda -->
  <path d="M136,136 L136,544 L316,544 L316,136 Z" fill="white" stroke="#19b347" stroke-width="20" stroke-linejoin="round"/>
  <line x1="316" y1="136" x2="316" y2="544" stroke="#19b347" stroke-width="20"/>
  <!-- Capa direita -->
  <path d="M316,136 L316,544 L496,544 L496,136 Z" fill="white" stroke="#19b347" stroke-width="20" stroke-linejoin="round"/>
  <!-- Divisórias horizontais -->
  <line x1="136" y1="340" x2="316" y2="340" stroke="#19b347" stroke-width="20"/>
  <line x1="316" y1="340" x2="496" y2="340" stroke="#19b347" stroke-width="20"/>

  <!-- TROFÉU -->
  <path d="M186,190 C186,190 183,282 226,282 C269,282 266,190 266,190 Z" fill="#F5C518"/>
  <path d="M188,208 C172,208 166,226 166,238 C166,250 174,254 188,248" fill="none" stroke="#F5C518" stroke-width="18" stroke-linecap="round"/>
  <path d="M264,208 C280,208 286,226 286,238 C286,250 278,254 264,248" fill="none" stroke="#F5C518" stroke-width="18" stroke-linecap="round"/>
  <rect x="217" y="282" width="18" height="28" rx="3" fill="#F5C518"/>
  <rect x="196" y="308" width="60" height="16" rx="6" fill="#F5C518"/>

  <!-- FIGURINHAS -->
  <g transform="rotate(-14 540 370)">
    <rect x="455" y="160" width="134" height="188" rx="10" fill="#b0bfc8"/>
    <rect x="463" y="168" width="118" height="172" rx="7" fill="#cdd8df"/>
  </g>
  <g transform="rotate(-6 540 370)">
    <rect x="458" y="164" width="134" height="188" rx="10" fill="#8fa4b4"/>
    <rect x="466" y="172" width="118" height="172" rx="7" fill="#b8cdd8"/>
  </g>
  <rect x="462" y="152" width="136" height="192" rx="12" fill="#1a3a6b"/>
  <rect x="472" y="162" width="116" height="172" rx="8" fill="#4badd4"/>
  <circle cx="530" cy="205" r="22" fill="white" opacity="0.95"/>
  <path d="M500,242 C501,230 512,224 530,224 C548,224 559,230 560,242 L563,300 C559,310 548,316 530,316 C512,316 501,310 497,300 Z" fill="white" opacity="0.95"/>

  <!-- LUPA -->
  <line x1="556" y1="500" x2="626" y2="570" stroke="#1a3a6b" stroke-width="38" stroke-linecap="round"/>
  <circle cx="494" cy="432" r="112" fill="#1a3a6b"/>
  <circle cx="494" cy="432" r="90" fill="#1f4a8a"/>
  <circle cx="494" cy="432" r="76" fill="white"/>
  <text x="494" y="466" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="90" font-weight="900" fill="#1a3a6b">$</text>
  <rect x="487" y="352" width="14" height="24" rx="5" fill="#1a3a6b"/>
  <rect x="487" y="488" width="14" height="24" rx="5" fill="#1a3a6b"/>
</svg>
